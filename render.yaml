services:
  - type: web
    name: cssd-api
    runtime: node
    plan: free
    rootDir: apps/api
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start:prod
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      # Browser Print (BROWSER_DIALOG) — เปิดชั่วคราวเพื่อให้หน้างานทดสอบบน Mac + XP-420B
      # และเก็บข้อมูลจริง (MACOS_BROWSER_PRINT_DIRECTIVE.md). ยังไม่ผ่าน hardware verification
      # (§15) — ปิดได้โดยตั้งค่าเป็น false หรือลบคีย์นี้แล้ว deploy ใหม่
      - key: CSSD_BROWSER_PRINT_ENABLED
        value: "true"
