name: cssd_mobile
description: ระบบตามรอยอุปกรณ์หัตถการปลอดเชื้อ — CSSD Sterile Tracking

publish_to: 'none'
version: 1.2.1+10

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.2.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP
  dio: ^5.4.3
  retrofit: ^4.1.0

  # QR / Camera
  mobile_scanner: ^5.1.1
  qr_flutter: ^4.1.0

  # (ตัด offline storage: ระบบเป็น online-only — ไม่มี drift/SQLite/sync queue)

  # Bluetooth printer — LEGACY direct-print fallback เท่านั้น (ไม่ใช่ทางหลัก)
  # ทางหลัก = Print Gateway + Xprinter XP-420B (usb_spool); ชุดนี้คงไว้เผื่อ fallback ฉุกเฉิน
  # ถอดได้เมื่อยืนยันยกเลิก BT fallback (พร้อม permission ใน AndroidManifest)
  print_bluetooth_thermal: ^1.2.2
  flutter_blue_plus: ^1.32.12
  permission_handler: ^11.3.1

  # Local notifications (expiry alerts)
  flutter_local_notifications: ^17.2.2

  # Push notifications (expiry reminder / daily summary reminder)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # Charts (dashboard donut)
  fl_chart: ^0.68.0

  # Report PDF printing
  pdf: ^3.11.1
  printing: ^5.13.2

  # Shared preferences / secure storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3

  # i18n
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Utilities
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.3.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  retrofit_generator: ^8.1.0

flutter:
  uses-material-design: true
  generate: true # เปิด gen-l10n (สร้าง AppLocalizations จาก lib/l10n/*.arb)
  assets:
    - assets/images/
    - assets/icons/
    # ฟอนต์ไทยสำหรับ PDF รายงาน — bundle ในแอปเพื่อให้สร้างรายงานได้ตอน offline
    # (เดิมใช้ PdfGoogleFonts ดาวน์โหลดจากเน็ตตอนสร้าง → offline พัง)
    - assets/fonts/Sarabun-Regular.ttf
    - assets/fonts/Sarabun-Bold.ttf
