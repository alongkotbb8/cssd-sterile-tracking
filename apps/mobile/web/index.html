<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="ระบบตามรอยอุปกรณ์หัตถการปลอดเชื้อ (CSSD)">
  <meta name="theme-color" content="#2F6BED">

  <!-- iOS: กด "เพิ่มลงหน้าจอโฮม" ใน Safari เพื่อใช้งานแบบแอพเต็มจอ -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Sterelis">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Sterelis — CSSD Sterile Tracking</title>
  <link rel="manifest" href="manifest.json">

  <!--
    หน้าจอโหลด — CanvasKit renderer ของ Flutter web ต้องโหลด wasm/js ก่อน
    (~ไม่กี่ MB หลังบีบอัด) ระหว่างนั้นจอจะว่างเปล่าถ้าไม่มีอะไรแสดงให้เห็น
    ทำให้ผู้ใช้คิดว่าหน้าพัง — ใส่ spinner ไว้ก่อน แล้วเอาออกตอนแอปพร้อม
    (event "flutter-first-frame" ที่ Flutter engine ยิงเองตอน render เฟรมแรก)
  -->
  <style>
    #app-loading {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      background: #F5F7FB; font-family: -apple-system, Roboto, sans-serif;
      z-index: 9999;
    }
    #app-loading .spinner {
      width: 40px; height: 40px; border-radius: 50%;
      border: 4px solid #DCE4F5; border-top-color: #2F6BED;
      animation: app-spin 0.8s linear infinite;
    }
    #app-loading .msg { color: #5B6B87; font-size: 14px; }
    @keyframes app-spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="app-loading">
    <div class="spinner"></div>
    <div class="msg">กำลังโหลด Sterelis CSSD…</div>
  </div>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('app-loading');
      if (el) el.remove();
    });
  </script>
</body>
</html>
